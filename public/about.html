<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root, [data-theme="dark"] {
      --bg-surface: #1e1e23;
      --text-primary: #e8e6e3;
      --text-tertiary: #6b6966;
      --text-muted: #4a4845;
      --accent-blue: #5b9cf5;
      --font-code: 'SF Mono', 'Menlo', 'Consolas', monospace;
      color-scheme: dark;
    }
    [data-theme="light"] {
      --bg-surface: #f5f5f7;
      --text-primary: #1a1a1e;
      --text-tertiary: #6e6e7a;
      --text-muted: #9a9aa4;
      --accent-blue: #2670e0;
      color-scheme: light;
    }

    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: var(--bg-surface);
      color: var(--text-primary);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
      user-select: none;
      text-align: center;
      padding: 32px;
      outline: none;
    }

    .about-logo { width: 80px; height: 80px; margin-bottom: 16px; }
    .about-title {
      font-size: 24px; font-weight: 700; color: var(--text-primary);
      margin-bottom: 4px;
    }
    .about-version {
      font-family: var(--font-code); font-size: 13px;
      color: var(--text-tertiary); margin-bottom: 6px;
    }
    .about-subtitle {
      font-size: 13px; color: var(--text-muted);
      margin-bottom: 24px;
    }
    .about-copyright {
      font-size: 11px; color: var(--text-muted);
      margin-bottom: 4px;
    }
    .about-link {
      color: var(--accent-blue); text-decoration: none; font-size: 11px;
    }
    .about-link:hover { text-decoration: underline; }
  </style>
</head>
<body tabindex="0">
  <img src="/openmv-logo.svg" class="about-logo" alt="OpenMV">
  <div class="about-title">OpenMV Studio</div>
  <div class="about-version" id="about-version"></div>
  <div class="about-subtitle">Machine Vision Made Simple</div>
  <div class="about-copyright">Copyright (c) 2026 OpenMV LLC.</div>
  <a class="about-link" id="about-link" href="#">openmv.io</a>

  <script>
    var listen = window.__TAURI__.event.listen;
    var emit = window.__TAURI__.event.emit;
    var invoke = window.__TAURI__.core.invoke;
    var appWindow = window.__TAURI__.window.getCurrentWindow();

    listen("about-init", function(event) {
      var d = event.payload;
      document.documentElement.setAttribute("data-theme", d.theme || "dark");
      document.getElementById("about-version").textContent = "v" + d.version;
    });

    document.getElementById("about-link").addEventListener("click", function(e) {
      e.preventDefault();
      invoke("cmd_open_url", { url: "https://openmv.io" });
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") {
        appWindow.destroy();
      }
    });

    document.body.focus();
    emit("about-ready", {});
  </script>
</body>
</html>
