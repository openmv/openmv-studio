<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e1e; color: #ccc;
      padding: 16px; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
      user-select: none;
    }
    #status {
      font-size: 12px; color: #aaa; margin-bottom: 8px;
      min-height: 18px;
    }
    #progress-bar-container {
      height: 6px; background: #2a2a2a; border-radius: 3px;
      margin-bottom: 10px; overflow: hidden;
    }
    #progress-bar {
      height: 100%; width: 0%; border-radius: 3px;
      background: #4a9eff;
      transition: width 0.3s ease;
    }
    #progress-bar.indeterminate {
      width: 30%;
      animation: indeterminate 1.5s ease-in-out infinite;
    }
    @keyframes indeterminate {
      0% { margin-left: 0%; }
      50% { margin-left: 70%; }
      100% { margin-left: 0%; }
    }
    #log {
      flex: 1; overflow-y: auto;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 11px; line-height: 1.6;
      color: #999; background: #161616;
      border-radius: 6px; padding: 8px 10px;
      border: 1px solid #2a2a2a;
    }
    #log div { white-space: pre-wrap; }
    #footer {
      display: flex; justify-content: flex-end;
      padding-top: 12px;
    }
    button {
      padding: 5px 20px; border-radius: 5px;
      border: 1px solid #444; background: #2a2a2a;
      color: #ccc; font-size: 12px; cursor: pointer;
    }
    button:hover:not(:disabled) { background: #333; }
    button:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>
  <div id="status">Waiting for device...</div>
  <div id="progress-bar-container">
    <div id="progress-bar" class="indeterminate"></div>
  </div>
  <div id="log"></div>
  <div id="footer">
    <button id="btn-close" disabled>Close</button>
  </div>
  <script src="/connect-helper.js"></script>
  <script>
    var listen = window.__TAURI__.event.listen;
    var invoke = window.__TAURI__.core.invoke;
    var appWindow = window.__TAURI__.window.getCurrentWindow();

    var statusEl = document.getElementById("status");
    var logEl = document.getElementById("log");
    var progressBar = document.getElementById("progress-bar");
    var btnClose = document.getElementById("btn-close");
    var inBootloader = false;
    var closing = false;

    function appendLog(text) {
      var line = document.createElement("div");
      line.textContent = text;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(text) {
      statusEl.textContent = text;
      appendLog(text);
    }

    listen("dfu-status", function(event) {
      if (typeof event.payload === "string") {
        statusEl.textContent = event.payload;
        appendLog(event.payload);
      }
    });

    listen("dfu-output", function(event) {
      appendLog(event.payload);
    });

    listen("dfu-done", function() {
      inBootloader = false;
      btnClose.disabled = false;
      progressBar.classList.remove("indeterminate");
      progressBar.style.width = "100%";
    });

    async function exitAndClose() {
      if (closing) {
        return;
      }
      closing = true;

      if (inBootloader) {
        try {
          setStatus("Exiting DFU mode...");
          await invoke("cmd_dfu_exit");
          inBootloader = false;
        } catch (err) {
          setStatus("DFU exit failed: " + err);
        }
      }

      await appWindow.destroy();
    }

    btnClose.addEventListener("click", exitAndClose);

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") {
        exitAndClose();
      }
    });

    appWindow.onCloseRequested(function(event) {
      if (closing) {
        return;
      }
      event.preventDefault();
      exitAndClose();
    });

    (async function init() {
      setStatus("Connecting to device...");
      var ok = await window.openmv.ensureConnected(2000);
      if (!ok) {
        setStatus("No supported board connected.");
        btnClose.disabled = false;
        return;
      }
      inBootloader = true;
      btnClose.disabled = false;
      try {
        await invoke("cmd_erase_filesystem");
      } catch (err) {
        setStatus("Erase failed: " + err);
        inBootloader = false;
        progressBar.classList.remove("indeterminate");
      }
    })();
  </script>
</body>
</html>
